<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LSM Laskar NKRI - Professional Auth System</title>

  <!-- Firebase (MODULAR v10) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // ===== FIREBASE CONFIG (ISI SENDIRI) =====
    const firebaseConfig = {
      apiKey: "ISI_API_KEY",
      authDomain: "ISI_AUTH_DOMAIN",
      databaseURL: "ISI_DATABASE_URL",
      projectId: "ISI_PROJECT_ID",
      appId: "ISI_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ===== UI =====
    const loginPage = document.getElementById("loginPage");
    const appPage = document.getElementById("app");

    window.register = async function(){
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;
      try{
        await createUserWithEmailAndPassword(auth,email,pass);
        alert("Akun berhasil dibuat");
      }catch(e){alert(e.message)}
    }

    window.login = async function(){
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;
      try{
        await signInWithEmailAndPassword(auth,email,pass);
      }catch(e){alert(e.message)}
    }

    window.logout = async function(){
      await signOut(auth);
    }

    onAuthStateChanged(auth,(user)=>{
      if(user){
        loginPage.style.display="none";
        appPage.style.display="block";
      }else{
        loginPage.style.display="block";
        appPage.style.display="none";
      }
    });

    // ANGGOTA ONLINE
    window.addAnggota = function(){
      const nama = document.getElementById("nama").value;
      if(nama){
        push(ref(db,"anggota"),{nama});
      }
    }

    const list = document.getElementById("list");

    onValue(ref(db,"anggota"),(snap)=>{
      list.innerHTML="";
      snap.forEach(child=>{
        const d = child.val();
        list.innerHTML += `<div class='member'>${d.nama}</div>`;
      });
    });
  </script>

  <style>
    body{margin:0;font-family:Arial;background:#f4f4f4}
    header{background:#b30000;color:white;text-align:center;padding:15px}
    .container{max-width:1000px;margin:auto;padding:15px}
    .card{background:white;padding:15px;margin:10px 0;border-radius:10px}
    input{width:100%;padding:10px;margin:5px 0}
    button{padding:10px;background:#b30000;color:white;border:none;border-radius:8px;width:100%;margin-top:5px}
    nav{display:flex;gap:10px;justify-content:center;background:#111;padding:10px}
    nav button{width:auto}
    .member{padding:10px;background:#eee;margin:5px 0;border-radius:6px}
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
  <div class="card">
    <h2>Login LSM NKRI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <h2>LSM LASKAR NKRI</h2>
    <button onclick="logout()">Logout</button>
  </header>

  <nav>
    <button onclick="document.getElementById('profil').scrollIntoView()">Profil</button>
    <button onclick="document.getElementById('anggota').scrollIntoView()">Anggota</button>
  </nav>

  <div class="container">

    <div id="profil" class="card">
      <h3>Profil</h3>
      <p>Organisasi LSM berbasis digital dengan login email profesional.</p>
      <p><b>Ketua:</b> Budianto</p>
      <p><b>Sekretaris:</b> Agus Purnama</p>
    </div>

    <div id="anggota" class="card">
      <h3>Anggota Online</h3>
      <input id="nama" placeholder="Nama anggota">
      <button onclick="addAnggota()">Tambah</button>
      <div id="list"></div>
    </div>

  </div>
</div>

</body>
</html>
